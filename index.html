<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title></title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=IBM+Plex+Mono:wght@300;400&display=swap');

    :root {
      --teal:  #2BADB8;
      --teal-d:#1E8A94;
      --teal-l:#4ECAD4;
      --ink:   #0D1F22;
      --muted: #5A7A80;
      --line:  rgba(43,173,184,.15);
      --bg:    #F4FAFB;
      --sans:  'Syne', sans-serif;
      --mono:  'IBM Plex Mono', monospace;
      --ease:  cubic-bezier(.4,0,.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      cursor: none;
      overflow: hidden;
    }

    /* Grid */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: .5;
    }

    /* Cursor */
    #cursor {
      position: fixed; width: 10px; height: 10px;
      background: var(--teal); border-radius: 50%;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%,-50%);
      transition: width .2s, height .2s;
    }
    #cursor-ring {
      position: fixed; width: 36px; height: 36px;
      border: 1.5px solid var(--teal); border-radius: 50%;
      pointer-events: none; z-index: 9998;
      transform: translate(-50%,-50%);
      transition: width .25s, height .25s;
      opacity: .4;
    }

    /* Corner marks — technical drawing reference */
    .corner {
      position: fixed;
      width: 24px; height: 24px;
    }
    .corner::before, .corner::after {
      content: ''; position: absolute;
      background: var(--teal); opacity: .4;
    }
    .corner::before { width: 100%; height: 1.5px; top: 0; left: 0; }
    .corner::after  { width: 1.5px; height: 100%; top: 0; left: 0; }

    .corner.tl { top: 24px; left: 24px; }
    .corner.tr { top: 24px; right: 24px; transform: scaleX(-1); }
    .corner.bl { bottom: 24px; left: 24px; transform: scaleY(-1); }
    .corner.br { bottom: 24px; right: 24px; transform: scale(-1); }

    /* Main content */
    .wrap {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; text-align: center;
      gap: 0;
    }

    .logo-mark {
      width: 56px; height: 56px;
      background: var(--teal); border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 32px;
      animation: fadeDown .8s var(--ease) .1s both;
    }

    .logo-mark svg { width: 34px; height: 34px; }

    .label {
      font-family: var(--mono);
      font-size: .6rem; letter-spacing: .22em;
      text-transform: uppercase; color: var(--teal);
      margin-bottom: 20px;
      display: flex; align-items: center; gap: 10px;
      animation: fadeDown .8s var(--ease) .2s both;
    }
    .label::before, .label::after {
      content: ''; display: block;
      width: 24px; height: 1.5px; background: var(--teal); opacity: .5;
    }

    h1 {
      font-size: clamp(3.5rem, 10vw, 7rem);
      font-weight: 800; letter-spacing: -.04em;
      line-height: .9; margin-bottom: 32px;
      animation: fadeDown .9s var(--ease) .3s both;
    }

    h1 span { color: var(--teal); display: block; }

    .desc {
      font-family: var(--mono);
      font-size: .78rem; line-height: 1.9;
      color: var(--muted); max-width: 340px;
      margin-bottom: 48px;
      animation: fadeDown .9s var(--ease) .45s both;
    }

    .status {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--mono); font-size: .62rem;
      letter-spacing: .14em; text-transform: uppercase;
      color: var(--muted);
      animation: fadeDown .8s var(--ease) .6s both;
    }

    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--teal);
      animation: pulse 2s ease-in-out infinite;
    }

    /* Footer */
    .foot {
      position: fixed; bottom: 32px;
      font-family: var(--mono); font-size: .58rem;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--muted); opacity: .6;
      animation: fadeUp .8s var(--ease) .8s both;
    }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .4; transform: scale(.7); }
    }

    @media(max-width:600px){
      body { cursor: auto; }
      #cursor, #cursor-ring { display: none; }
      .corner { display: none; }
    }
  </style>
</head>

  const cur = document.getElementById('cursor');
  const ring = document.getElementById('cursor-ring');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
  (function anim(){
    cur.style.left=mx+'px'; cur.style.top=my+'px';
    rx+=(mx-rx)*.12; ry+=(my-ry)*.12;
    ring.style.left=rx+'px'; ring.style.top=ry+'px';
    requestAnimationFrame(anim);
  })();
