<style>
.page-main {
    padding-top: -15px;
}
/* ── Grid page ──────────────────────────── */
.projects-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 32px;
  flex-wrap: wrap;
  gap: 16px;
}
.tag-filter {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  width: 100%;
  margin-bottom: 32px;
}
.filter-btn {
  font-family: var(--mono);
  font-size: .58rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
  background: transparent;
  border: none;
  padding: 12px 14px;
  cursor: none;
  transition: all .25s var(--ease);
  text-align: center;
  width: 100px
}
.filter-btn:hover {
  color: var(--ink);
}
.filter-btn.active[data-tag="all"] {
  background: #5A7A80;
  color: var(--white);
  border-radius: 4px;
}
.filter-btn.active[data-tag="Product"] {
  background: var(--teal);
  color: var(--white);
  border-radius: 4px;
}
.filter-btn.active[data-tag="Visual"] {
  background: #B85A2B;
  color: var(--white);
  border-radius: 4px;
}

/* ── Grid ───────────────────────────────── */
.projects-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  background: transparent;
  border: none;
  margin: 0 auto;
  max-width: 1500px;
}

/* ── Card ───────────────────────────────── */
.project-card {
  background: var(--white);
  text-decoration: none;
  color: var(--ink);
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  transition: background .25s;
  border-radius: 10px;
}
.project-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 0;
  background: var(--teal);
  transition: height .3s var(--ease);
  z-index: 2;
  border-radius: 0 0 0 10px;
}
.project-card:hover::before { height: 100%; }

/* ── Image area ─────────────────────────── */
.project-card-img {
  aspect-ratio: 1 / 1;
  width: 100%;
  height: auto;
  background-size: cover;
  background-position: center;
  background-color: var(--teal-xl);
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
}
/* placeholder glyph when no image */
.project-card-img::after {
  content: '◈';
  font-size: 2rem;
  color: var(--teal);
  opacity: .3;
  transition: opacity .25s;
}
.project-card-img[style*="background-image"]::after { display: none; }

/* ── Hover overlay ──────────────────────── */
.card-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(13,31,34,.85) 0%, rgba(13,31,34,.25) 60%, transparent 100%);
  opacity: 0;
  transition: opacity .3s var(--ease);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 20px 18px;
  z-index: 1;
}
.project-card:hover .card-overlay { opacity: 1; }

.overlay-title {
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: -.02em;
  color: var(--white);
  line-height: 1.2;
  margin-bottom: 6px;
  transform: translateY(6px);
  transition: transform .3s var(--ease);
}
.project-card:hover .overlay-title { transform: translateY(0); }

.overlay-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  transform: translateY(6px);
  transition: transform .3s var(--ease) .04s;
}
.project-card:hover .overlay-meta { transform: translateY(0); }

.overlay-year {
  font-family: var(--mono);
  font-size: .6rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: rgba(255,255,255,.6);
}
.overlay-tag {
  font-family: var(--mono);
  font-size: .58rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--teal);
  background: rgba(43,173,184,.22);
  border: 1px solid rgba(43,173,184,.35);
  padding: 2px 8px;
  border-radius: 2px;
}
.overlay-arrow {
  margin-left: auto;
  font-size: .8rem;
  color: rgba(255,255,255,.5);
  transition: transform .25s var(--ease), color .2s;
}
.project-card:hover .overlay-arrow { transform: translate(2px,-2px); color: var(--white); }

/* ── Card body (below image) ────────────── */
.project-card-body {
  padding: 22px 20px 20px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.project-num {
  font-family: var(--mono);
  font-size: .58rem;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--teal);
}
.project-card-title {
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: -.02em;
  line-height: 1.2;
}
.project-card-excerpt {
  font-family: var(--mono);
  font-size: .68rem;
  color: var(--muted);
  line-height: 1.65;
  flex: 1;
}

/* ── Responsive ─────────────────────────── */
@media(max-width:1100px) {
  .projects-grid { grid-template-columns: repeat(4, 1fr); gap: 10px; }
}
@media(max-width:900px) {
  .projects-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
}
@media(max-width:500px) {
  .projects-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .card-overlay { opacity: 1; background: linear-gradient(to top, rgba(13,31,34,.7) 0%, transparent 55%); }
}
</style>

<script>
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const tag = btn.dataset.tag;
      document.querySelectorAll('.project-card').forEach(card => {
        const show = tag === 'all' || card.dataset.tags.includes(tag);
        card.style.display = show ? 'flex' : 'none';
      });
    });
  });
</script>
